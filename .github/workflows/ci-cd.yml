# ============================================
# AURA-PET: GitHub Actions CI/CD
# 自动部署 Flutter Web 到 GitHub Pages
# ============================================

name: Deploy Aura-Pet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ========== Flutter Web 构建 & 部署 ==========
  build-and-deploy-flutter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd flutter_app && flutter pub get

      - name: Analyze
        run: |
          cd flutter_app && flutter analyze --no-fatal-infos

      - name: Build web
        run: |
          cd flutter_app && flutter build web --release

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ========== 后端测试 ==========
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          pytest tests/ -v

  # ========== Docker 构建 ==========
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/aura-pet-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== 发布 ==========
  release:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LICENSE
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
