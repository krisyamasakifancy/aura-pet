# ============================================
# AURA-PET: GitHub Actions CI/CD
# 自动部署 Flutter Web 到 GitHub Pages
# 
# 安全说明：
# - 所有 API Keys 通过 GitHub Secrets 管理
# - 绝对不硬编码任何密钥
# - 环境变量在 workflow 中注入
# ============================================

name: Deploy Aura-Pet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 环境变量（安全：不输出到日志）
env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  # ========== Flutter Web 构建 & 部署 ==========
  build-and-deploy-flutter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # ========== 关键：注入环境变量 ==========
      - name: Set environment variables
        run: |
          cd flutter_app
          # 将 secrets 写入 .env 文件（仅用于构建）
          cat > .env << EOF
          GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}
          STRIPE_API_KEY=${{ env.STRIPE_API_KEY }}
          EOF
          echo "✅ 环境变量已设置（不输出具体值）"

      - name: Install dependencies
        run: |
          cd flutter_app && flutter pub get

      - name: Analyze
        run: |
          cd flutter_app && flutter analyze --no-fatal-infos

      # ========== 构建 Web（注入 API Key）==========
      - name: Build web
        run: |
          cd flutter_app && flutter build web --release \
            --dart-define=GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app/build/web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ========== 后端测试（使用 Secrets）==========
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ========== 注入后端环境变量 ==========
      - name: Set backend environment variables
        run: |
          cat >> $GITHUB_ENV << EOF
          DATABASE_URL=${{ env.DATABASE_URL }}
          GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          EOF
          echo "✅ 后端环境变量已配置"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Verify Gemini configuration
        run: |
          python config.py || true
          echo "✅ 配置检查完成"

      - name: Run tests
        run: |
          pytest tests/ -v

  # ========== Docker 构建（使用 Secrets）==========
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ========== 传递环境变量到 Docker 构建 ==========
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/aura-pet-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}
            DATABASE_URL=${{ env.DATABASE_URL }}
          secret-files: |
            id=env,.env

  # ========== 发布 ==========
  release:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LICENSE
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ============================================
# 🔐 安全操作指南
# ============================================
# 
# 1. 设置 GitHub Secrets:
#    - 进入 Repository → Settings → Secrets and variables → Actions
#    - 添加以下 Secrets:
#      * GEMINI_API_KEY: 你的 Google AI Studio API Key
#      * DATABASE_URL: 生产数据库连接字符串
#      * SECRET_KEY: 应用密钥 (生成: python -c "import secrets; print(secrets.token_urlsafe(32))")
#      * DOCKER_USERNAME: Docker Hub 用户名
#      * DOCKER_TOKEN: Docker Hub Access Token
# 
# 2. 获取 Gemini API Key:
#    - 访问 https://makersuite.google.com/app/apikey
#    - 创建 API Key 并复制
#    - 粘贴到 GitHub Secrets
# 
# 3. 绝对禁止:
#    - 将真实 API Key 提交到代码仓库
#    - 在 workflow 中打印密钥值
#    - 在日志中输出敏感信息
# 
# ============================================

# Aura-Pet 🦝
