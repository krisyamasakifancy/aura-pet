<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aura-Pet | 44页全量体验</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: #FFF0F5;
      transition: background 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* 指示器 */
    .indicator {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      z-index: 100;
      padding: 10px 14px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: calc(100% - 48px);
      overflow-x: auto;
    }

    .indicator::-webkit-scrollbar { display: none; }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 4px;
      background: #B2BEC3;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      flex-shrink: 0;
    }

    .dot.active {
      width: 20px;
      background: #FF8BA0;
      box-shadow: 0 2px 8px rgba(255,139,160,0.4);
    }

    /* 页面 */
    .pages {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      height: 100vh;
    }

    .page {
      min-width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 140px;
    }

    .page-emoji {
      font-size: 56px;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }

    .page-subtitle {
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      opacity: 0.7;
    }

    .page-counter {
      margin-top: 20px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.5);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    /* 小熊 */
    .pet-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 32px auto;
    }

    .pet-glow {
      position: absolute;
      top: -15%;
      left: -15%;
      width: 130%;
      height: 130%;
      border-radius: 50%;
      animation: glow-pulse 2.5s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.06); }
    }

    .pet {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      animation: breathe 2.5s ease-in-out infinite;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }

    .pet-face {
      position: absolute;
      top: 20%;
      left: 10%;
      width: 80%;
      height: 55%;
      background: white;
      border-radius: 40%;
    }

    .pet-eye {
      position: absolute;
      width: 14%;
      height: 14%;
      background: #2D3436;
      border-radius: 50%;
      top: 30%;
    }

    .pet-eye.left { left: 22%; }
    .pet-eye.right { right: 22%; }

    .pet-eye-shine {
      position: absolute;
      width: 40%;
      height: 40%;
      background: white;
      border-radius: 50%;
      top: 18%;
      left: 18%;
    }

    .pet-blush {
      position: absolute;
      bottom: 28%;
      width: 16%;
      height: 10%;
      background: rgba(255,139,160,0.45);
      border-radius: 50%;
    }

    .pet-blush.left { left: 6%; }
    .pet-blush.right { right: 6%; }

    .pet-mouth {
      position: absolute;
      bottom: 16%;
      left: 50%;
      transform: translateX(-50%);
      width: 22%;
      height: 12%;
      border-bottom: 3px solid #2D3436;
      border-radius: 0 0 50% 50%;
    }

    .pet-heart {
      position: absolute;
      bottom: 50%;
      right: 2%;
      font-size: 28px;
      animation: heart-float 1.5s ease-in-out infinite;
    }

    @keyframes heart-float {
      0%, 100% { transform: translateY(0) rotate(-15deg) scale(1); }
      50% { transform: translateY(-6px) rotate(-15deg) scale(1.12); }
    }

    /* 睡眠模式 */
    .pet-sleeping .pet { background: linear-gradient(135deg, #7986CB, #5C6BC0); }
    .pet-sleeping .pet-glow { background: radial-gradient(circle, rgba(108,99,255,0.4) 0%, transparent 70%); }
    .pet-sleeping .sleep-hat { position: absolute; top: -12%; left: 50%; transform: translateX(-50%); font-size: 28px; }
    .pet-sleeping .zzz { position: absolute; top: 5%; right: 15%; font-size: 22px; animation: zzz-float 2s ease-in-out infinite; }
    @keyframes zzz-float { 0%, 100% { transform: translateY(0) rotate(-10deg); opacity: 1; } 50% { transform: translateY(-12px); opacity: 0.4; } }
    .pet-sleeping .sleep-eye { position: absolute; top: 35%; width: 20%; height: 4%; background: #2D3436; border-radius: 2px; }
    .pet-sleeping .sleep-eye.left { left: 24%; }
    .pet-sleeping .sleep-eye.right { right: 24%; }

    /* 潜水模式 */
    .pet-diving .pet { background: linear-gradient(135deg, #64B5F6, #42A5F5); }
    .pet-diving .pet-glow { background: radial-gradient(circle, rgba(100,181,246,0.4) 0%, transparent 70%); }
    .pet-diving .goggles { position: absolute; top: 24%; left: 14%; width: 26%; height: 18%; background: rgba(100,181,246,0.5); border: 3px solid white; border-radius: 35%; }
    .pet-diving .goggles.right { left: auto; right: 14%; }
    .pet-diving .bubble { position: absolute; bottom: 8%; right: 2%; font-size: 18px; }

    /* 庆祝模式 */
    .pet-celebrating .pet { background: linear-gradient(135deg, #FFD700, #FFB74D); }
    .pet-celebrating .pet-glow { background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%); }
    .pet-celebrating .crown { position: absolute; top: -22%; left: 50%; transform: translateX(-50%); font-size: 36px; }
    .pet-celebrating .star-eye { position: absolute; top: 28%; font-size: 14px; }
    .pet-celebrating .star-eye.left { left: 22%; }
    .pet-celebrating .star-eye.right { right: 22%; }

    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 386px;
      width: calc(100% - 48px);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      z-index: 100;
    }

    .nav-back {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #F5F5F5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .nav-back:active { transform: scale(0.9); }
    .nav-back.hidden { opacity: 0; pointer-events: none; width: 0; overflow: hidden; }

    .nav-main {
      flex: 1;
      height: 52px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .nav-main:active { transform: scale(0.96); }
    .nav-main .arrow { opacity: 0.7; font-size: 14px; }
    .nav-main .emoji { font-size: 18px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="indicator" id="indicator"></div>
    <div class="pages" id="pages"></div>
    <div class="bottom-nav">
      <div class="nav-back hidden" id="navBack">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>

      <div class="nav-main" id="navMain">
        <span class="emoji" id="navEmoji">💫</span>
        <span id="navText">开始体验</span>
        <span class="arrow" id="navArrow">→</span>
      </div>

  <script>
    const TOTAL = 44;
    let current = 0;

    const data = [
      {emoji: '💫', title: 'Aura-Pet', subtitle: 'Welcome!', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},

      {emoji: '💕', title: 'Pet Misses You', subtitle: 'Come play with me!', petState: 'hearting', bg: '#FFF0F5', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},

      {emoji: '📸', title: 'Snap & Log', subtitle: 'AI food recognition', petState: 'hearting', bg: '#FFF0F5', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},
      {emoji: '🍽️', title: 'Delicious!', subtitle: '320 kcal logged', petState: 'hearting', bg: '#FFF0F5', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},
      {emoji: '📋', title: 'Meal History', subtitle: 'Track your meals', petState: 'hearting', bg: '#FFF0F5', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},
      {emoji: '🍎', title: 'Nutrition Info', subtitle: 'Balanced diet', petState: 'hearting', bg: '#FFF5F5', glow: 'rgba(255,183,77,0.4)', color: '#FFB74D'},
      {emoji: '💧', title: 'Stay Hydrated!', subtitle: 'Diving mode', petState: 'diving', bg: '#E3F2FD', glow: 'rgba(100,181,246,0.4)', color: '#1976D2'},
      {emoji: '⚖️', title: 'Weight Log', subtitle: '65.5 kg today', petState: 'hearting', bg: '#FFF8F0', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},
      {emoji: '📊', title: 'BMI Calculator', subtitle: '22.5 - Healthy', petState: 'hearting', bg: '#FFF8F0', glow: 'rgba(255,183,77,0.4)', color: '#FFB74D'},
      {emoji: '🌙', title: '16:8 Fasting', subtitle: 'Deep sleep mode', petState: 'sleeping', bg: '#1A1A2E', glow: 'rgba(108,99,255,0.4)', color: '#6C63FF'},
      {emoji: '⏰', title: 'Fasting Schedule', subtitle: 'Set your plan', petState: 'hearting', bg: '#E8F5E9', glow: 'rgba(76,175,80,0.4)', color: '#4CAF50'},
      {emoji: '📈', title: 'Progress', subtitle: '-5kg this month', petState: 'hearting', bg: '#FFF8F0', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},
      {emoji: '📅', title: 'Weekly Report', subtitle: '7 days streak', petState: 'hearting', bg: '#FFF8F0', glow: 'rgba(255,183,77,0.4)', color: '#FFB74D'},
      {emoji: '📆', title: 'Monthly Report', subtitle: '30 days streak', petState: 'hearting', bg: '#FFF8F0', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},
      {emoji: '🏆', title: 'Achievements', subtitle: '12 badges earned', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '🎖️', title: 'Badge Unlocked', subtitle: 'Consistency King', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '🛍️', title: 'Pet Shop', subtitle: 'Unlock new skins', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '🎁', title: 'Product Detail', subtitle: 'Royal Crown - 500 coins', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '💳', title: 'Confirm Purchase', subtitle: 'Royal Crown x1', petState: 'celebrating', bg: '#FFE4B5', glow: 'rgba(155,89,182,0.4)', color: '#9B59B6'},
      {emoji: '🐻', title: 'My Pet', subtitle: 'Level 15 Bear', petState: 'hearting', bg: '#FFF0F5', glow: 'rgba(255,139,160,0.4)', color: '#FF8BA0'},
      {emoji: '👗', title: 'Dress Up', subtitle: 'Customize your pet', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '👤', title: 'Profile', subtitle: 'Edit your info', petState: 'hearting', bg: '#F5F5F5', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '⚙️', title: 'Settings', subtitle: 'Preferences', petState: 'hearting', bg: '#FAFAFA', glow: 'rgba(99,110,114,0.3)', color: '#636E72'},
      {emoji: '🔔', title: 'Notifications', subtitle: 'Stay informed', petState: 'hearting', bg: '#F5F5F5', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '🎯', title: 'Set Goals', subtitle: 'Define your targets', petState: 'hearting', bg: '#F0F4FF', glow: 'rgba(155,143,232,0.4)', color: '#9B8FE8'},
      {emoji: '👑', title: 'Go Premium', subtitle: 'Unlock all features', petState: 'celebrating', bg: '#1A1A2E', glow: 'rgba(155,89,182,0.5)', color: '#9B59B6'},
      {emoji: '🔐', title: 'Welcome Back', subtitle: 'Sign in to continue', petState: 'hearting', bg: '#FFFFFF', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '📝', title: 'Create Account', subtitle: 'Join our family', petState: 'hearting', bg: '#FFFFFF', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '🔑', title: 'Reset Password', subtitle: 'Recover your account', petState: 'hearting', bg: '#FFFFFF', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '🔍', title: 'Search', subtitle: 'Find anything', petState: 'hearting', bg: '#FFFFFF', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '📅', title: 'Calendar', subtitle: 'Your schedule', petState: 'hearting', bg: '#E3F2FD', glow: 'rgba(25,118,210,0.4)', color: '#1976D2'},
      {emoji: '🔄', title: 'Sync Data', subtitle: 'Cloud backup', petState: 'hearting', bg: '#FFFFFF', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '❓', title: 'Help & Support', subtitle: 'We are here', petState: 'hearting', bg: '#FFFFFF', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: 'ℹ️', title: 'About Us', subtitle: 'Learn more', petState: 'hearting', bg: '#FFFFFF', glow: 'rgba(107,158,184,0.4)', color: '#6B9EB8'},
      {emoji: '🔒', title: 'Privacy Policy', subtitle: 'Your data is safe', petState: 'hearting', bg: '#FAFAFA', glow: 'rgba(99,110,114,0.3)', color: '#636E72'},
      {emoji: '📜', title: 'Terms of Service', subtitle: 'Read our terms', petState: 'hearting', bg: '#FAFAFA', glow: 'rgba(99,110,114,0.3)', color: '#636E72'},
      {emoji: '🏅', title: 'Hall of Fame', subtitle: 'Top performers', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '✅', title: 'Daily Tasks', subtitle: '3/5 completed', petState: 'hearting', bg: '#E8F5E9', glow: 'rgba(76,175,80,0.4)', color: '#4CAF50'},
      {emoji: '🎉', title: 'Activities', subtitle: 'Join events', petState: 'celebrating', bg: '#FFF8E1', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '🎊', title: 'Congratulations!', subtitle: 'Goal achieved!', petState: 'celebrating', bg: '#FFE4B5', glow: 'rgba(255,215,0,0.4)', color: '#FFD700'},
      {emoji: '🎉', title: 'All Done!', subtitle: 'Mission complete', petState: 'celebrating', bg: '#FFD700', glow: 'rgba(255,183,77,0.4)', color: '#FFB74D'},
    ];

    const pagesEl = document.getElementById('pages');
    const indicatorEl = document.getElementById('indicator');
    const navBack = document.getElementById('navBack');
    const navMain = document.getElementById('navMain');
    const navEmoji = document.getElementById('navEmoji');
    const navText = document.getElementById('navText');
    const navArrow = document.getElementById('navArrow');

    // 创建页面
    data.forEach((d, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      indicatorEl.appendChild(dot);

      const page = document.createElement('div');
      page.className = 'page';
      page.style.background = `linear-gradient(180deg, ${d.bg} 0%, ${adjustColor(d.bg, 20)} 100%)`;
      page.style.color = isDark(d.bg) ? 'white' : '#2D3436';
      page.innerHTML = `
        <div class="page-emoji">${d.emoji}</div>
        <div class="pet-wrapper pet-${d.petState}">
          <div class="pet-glow" style="background: ${d.glow};"></div>
          <div class="pet">
            <div class="pet-face">
              ${buildPetExtras(d.petState)}
            </div>
          </div>
        </div>
        <h1 class="page-title">${d.title}</h1>
        <p class="page-subtitle">${d.subtitle}</p>
        <div class="page-counter">P${String(i+1).padStart(2,'0')}/44</div>
      `;
      pagesEl.appendChild(page);
    });

    function buildPetExtras(state) {
      if (state === 'sleeping') {
        return `<div class="sleep-hat">⭐</div><div class="sleep-eye left"></div><div class="sleep-eye right"></div><div class="zzz">💤</div>`;
      } else if (state === 'diving') {
        return `<div class="goggles"></div><div class="goggles right"></div><div class="bubble">🫧</div>`;
      } else if (state === 'celebrating') {
        return `<div class="crown">👑</div><div class="star-eye left">⭐</div><div class="star-eye right">⭐</div>`;
      } else {
        return `<div class="pet-eye left"><div class="pet-eye-shine"></div></div><div class="pet-eye right"><div class="pet-eye-shine"></div></div><div class="pet-blush left"></div><div class="pet-blush right"></div><div class="pet-mouth"></div><div class="pet-heart">💕</div>`;
      }
    }

    function adjustColor(hex, amount) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.min(255, (num >> 16) + amount);
      const g = Math.min(255, ((num >> 8) & 0x00FF) + amount);
      const b = Math.min(255, (num & 0x0000FF) + amount);
      return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
    }

    function isDark(hex) {
      const num = parseInt(hex.slice(1), 16);
      const r = num >> 16;
      const g = (num >> 8) & 0x00FF;
      const b = num & 0x0000FF;
      return (r * 299 + g * 587 + b * 114) / 1000 < 128;
    }

    function update() {
      pagesEl.style.transform = `translateX(-${current * 100}%)`;
      document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === current));
      body.style.background = data[current].bg;
      
      const isLast = current === TOTAL - 1;
      navMain.style.background = `linear-gradient(135deg, ${data[current].color}, ${adjustColor(data[current].color.replace('#', ''), 30)})`;
      navEmoji.textContent = data[current].emoji;
      navText.textContent = isLast ? '完成' : '下一步';
      navArrow.style.opacity = isLast ? '0' : '1';
      navBack.classList.toggle('hidden', current === 0);
      
      if (navigator.vibrate) navigator.vibrate(8);
    }

    function next() { if (current < TOTAL - 1) { current++; update(); } }
    function prev() { if (current > 0) { current--; update(); } }

    navMain.addEventListener('click', next);
    navBack.addEventListener('click', prev);

    let startX = 0;
    document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 60) { diff > 0 ? next() : prev(); }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') next();
      if (e.key === 'ArrowLeft') prev();
    });
  </script>
</body>
</html>
