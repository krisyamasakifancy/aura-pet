<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura-Pet - 智能宠物养成</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --monet-rose: #E8B4B8;
            --monet-lavender: #C9B8E0;
            --monet-peach: #F5D0C5;
            --accent-pink: #FF6B9D;
            --accent-purple: #A855F7;
            --accent-green: #4ADE80;
            --accent-gold: #FBBF24;
            --van-gogh-night: #0D1117;
            --van-gogh-twilight: #161B22;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary-hue: 320;
            --font-display: 'Quicksand', 'Noto Sans SC', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-display);
            min-height: 100vh;
            overflow: hidden;
            background: var(--van-gogh-night);
            color: white;
            -webkit-font-smoothing: antialiased;
        }
        
        .monet-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
        }
        
        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, hsla(var(--primary-hue), 70%, 65%, 0.5) 0%, transparent 70%);
            top: -150px;
            left: -150px;
            animation: orbFloat1 25s ease-in-out infinite;
        }
        
        .orb-2 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, hsla(calc(var(--primary-hue) + 40), 60%, 70%, 0.4) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation: orbFloat2 30s ease-in-out infinite;
        }
        
        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, hsla(calc(var(--primary-hue) + 80), 50%, 60%, 0.35) 0%, transparent 70%);
            top: 40%;
            left: 60%;
            transform: translate(-50%, -50%);
            animation: orbFloat3 20s ease-in-out infinite;
        }
        
        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.95); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }
        
        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 60px) scale(1.15); }
            66% { transform: translate(60px, -40px) scale(0.9); }
        }
        
        @keyframes orbFloat3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-40%, -60%) scale(1.2); }
        }
        
        .app-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top, 24px) 20px env(safe-area-inset-bottom, 20px);
            max-width: 480px;
            margin: 0 auto;
        }
        
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }
        
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
        }
        
        .brand-name {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, white, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-coins {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }
        
        .coin-amount { font-size: 16px; font-weight: 700; color: var(--accent-gold); }
        
        .pet-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .pet-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        .pet-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, hsla(var(--primary-hue), 70%, 65%, 0.2) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        #pet-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .mood-badge {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        
        .mood-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: moodPulse 2s ease-in-out infinite;
        }
        
        @keyframes moodPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }
        
        .mood-text { font-size: 13px; font-weight: 600; }
        
        .pet-identity { text-align: center; margin-top: 16px; }
        .pet-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        
        .pet-level {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .xp-section {
            margin-top: 16px;
            width: 100%;
            max-width: 180px;
        }
        
        .xp-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple));
            border-radius: 3px;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .xp-text {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 6px;
            text-align: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 16px 0;
        }
        
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .stat-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.08); }
        .stat-card:active { transform: scale(0.97); }
        .stat-icon { font-size: 22px; margin-bottom: 6px; }
        .stat-value { font-size: 16px; font-weight: 700; }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        
        .primary-action {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            border: none;
            border-radius: 20px;
            color: white;
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.35);
            transition: all 0.3s ease;
        }
        
        .primary-action:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255, 107, 157, 0.45); }
        .primary-action:active { transform: scale(0.98); }
        
        .secondary-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        
        .secondary-btn {
            padding: 14px 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .secondary-btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .secondary-btn:active { transform: scale(0.95); }
        .secondary-btn-icon { font-size: 24px; }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 16px 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border-top: 1px solid var(--glass-border);
            border-radius: 24px 24px 0 0;
            margin: 0 -20px;
            padding-left: max(20px, calc(50vw - 220px));
            padding-right: max(20px, calc(50vw - 220px));
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-item:hover { color: rgba(255,255,255,0.6); }
        .nav-item.active { color: var(--accent-pink); }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; }
        
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .dialog-overlay.active { opacity: 1; pointer-events: all; }
        
        .dialog-card {
            background: var(--van-gogh-twilight);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px;
            max-width: 90%;
            width: 360px;
            text-align: center;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }
        
        .dialog-overlay.active .dialog-card { transform: scale(1) translateY(0); }
        
        .camera-frame {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, var(--van-gogh-night), var(--van-gogh-twilight));
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--glass-border);
        }
        
        .camera-placeholder { text-align: center; color: rgba(255,255,255,0.5); }
        .camera-icon { font-size: 48px; margin-bottom: 8px; animation: cameraPulse 2s ease-in-out infinite; }
        
        @keyframes cameraPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .food-result { padding: 20px; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); }
        .food-emoji { font-size: 56px; margin-bottom: 12px; }
        .food-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .food-calories { font-size: 14px; color: var(--accent-pink); margin-bottom: 8px; }
        
        .food-label {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .dialog-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .dialog-message { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 24px; }
        
        .dialog-actions { display: flex; gap: 12px; }
        
        .dialog-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 16px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        
        .dialog-btn.primary {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.3);
        }
        
        .dialog-btn.secondary {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.8);
        }
        
        .dialog-btn:hover { transform: translateY(-2px); }
        .dialog-btn:active { transform: scale(0.97); }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        
        .toast-container.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        .toast {
            padding: 14px 24px;
            background: var(--van-gogh-twilight);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
        
        .toast-icon { font-size: 20px; }
        .toast-text { font-size: 14px; font-weight: 600; }
        
        .coin-float {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            animation: coinRise 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            z-index: 1500;
        }
        
        @keyframes coinRise {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
        }
        
        .touch-particle {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            animation: particleFloat 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            z-index: 100;
        }
        
        @keyframes particleFloat {
            0% { opacity: 1; transform: scale(0); }
            20% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
        }
        
        .speech-bubble {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 16px;
            background: white;
            border-radius: 16px;
            color: var(--van-gogh-night);
            font-size: 13px;
            font-weight: 600;
            max-width: 200px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid white;
        }
        
        .speech-bubble.show { opacity: 1; top: -60px; }
        
        /* Pet Animations */
        .pet-bounce { animation: petBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pet-spin { animation: petSpin 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pet-jump { animation: petJump 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pet-hug { animation: petHug 1s ease-out; }
        
        @keyframes petBounce {
            0%, 100% { transform: scale(1); }
            20% { transform: scale(1.35); }
            40% { transform: scale(0.9); }
            60% { transform: scale(1.15); }
        }
        
        @keyframes petSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(360deg) scale(1.25); }
            100% { transform: rotate(720deg) scale(1); }
        }
        
        @keyframes petJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-80px); }
        }
        
        @keyframes petHug {
            0% { transform: scale(1); }
            30% { transform: scale(1.2) translateY(-15px); }
            60% { transform: scale(1.1) translateY(8px); }
        }
    </style>
</head>
<body>
    <div class="monet-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    
    <div class="app-container">
        <div class="app-header">
            <div class="header-brand">
                <div class="brand-avatar">🦝</div>
                <div class="brand-name">Aura-Pet</div>
            </div>
            <div class="header-coins">
                <span>🪙</span>
                <span class="coin-amount" id="coinDisplay">280</span>
            </div>
        </div>
        
        <div class="pet-stage">
            <div class="pet-wrapper" id="petWrapper">
                <div class="pet-glow"></div>
                <canvas id="pet-canvas"></canvas>
                <div class="speech-bubble" id="speechBubble"></div>
                <div class="mood-badge">
                    <div class="mood-indicator" id="moodIndicator"></div>
                    <span class="mood-text" id="moodText">超开心</span>
                </div>
            </div>
            
            <div class="pet-identity">
                <div class="pet-name" id="petName">小浣熊 · 毛毛</div>
                <div class="pet-level">
                    <span>⭐</span>
                    <span id="petLevel">Lv.3 幼年期</span>
                </div>
            </div>
            
            <div class="xp-section">
                <div class="xp-bar">
                    <div class="xp-fill" id="xpFill" style="width: 65%"></div>
                </div>
                <div class="xp-text"><span id="xpCurrent">130</span> / <span id="xpMax">200</span> XP</div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card" onclick="showToast('🍽️ 今日已记录 3 餐')">
                <div class="stat-icon">🍽️</div>
                <div class="stat-value" id="mealsCount">3</div>
                <div class="stat-label">餐食</div>
            </div>
            <div class="stat-card" onclick="showToast('💧 水分充足！')">
                <div class="stat-icon">💧</div>
                <div class="stat-value" id="waterCount">1500</div>
                <div class="stat-label">ml</div>
            </div>
            <div class="stat-card" onclick="showToast('🔥 连续 7 天！')">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="streakCount">7</div>
                <div class="stat-label">天</div>
            </div>
            <div class="stat-card" onclick="showToast('💖 饱腹度 85%')">
                <div class="stat-icon">💖</div>
                <div class="stat-value" id="fullnessCount">85</div>
                <div class="stat-label">饱腹</div>
            </div>
        </div>
        
        <div class="actions-section">
            <button class="primary-action" onclick="openMealDialog()">
                <span>📸</span>
                <span>拍照记录餐食</span>
            </button>
            
            <div class="secondary-actions">
                <button class="secondary-btn" onclick="addWater()">
                    <span class="secondary-btn-icon">🥤</span>
                    <span>喝水</span>
                </button>
                <button class="secondary-btn" onclick="petAction('headpat')">
                    <span class="secondary-btn-icon">👋</span>
                    <span>摸摸</span>
                </button>
                <button class="secondary-btn" onclick="petAction('poke')">
                    <span class="secondary-btn-icon">😺</span>
                    <span>戳戳</span>
                </button>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </div>
            <div class="nav-item" onclick="showToast('📊 数据看板')">
                <span class="nav-icon">📊</span>
                <span class="nav-label">看板</span>
            </div>
            <div class="nav-item" onclick="showToast('🛒 商店')">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">商店</span>
            </div>
            <div class="nav-item" onclick="showToast('👤 个人中心')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">我的</span>
            </div>
        </div>
    </div>
    
    <div class="dialog-overlay" id="mealDialog">
        <div class="dialog-card">
            <div class="camera-frame" id="cameraFrame">
                <div class="camera-placeholder" id="cameraPlaceholder">
                    <div class="camera-icon">📸</div>
                    <div>点击拍照</div>
                </div>

        // ============================================
        // PET RENDERER
        // ============================================
        class PetRenderer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.breathPhase = 0;
                this.blinkTimer = 0;
                this.blinkDuration = 0;
                this.eyeOpenness = 1;
                this.currentEmotion = 'happy';
                this.floatY = 0;
                this.tailWag = 0;
                this.earTwitch = 0;
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.startLoop();
            }
            
            resize() {
                const container = this.canvas.parentElement;
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
            }
            
            startLoop() {
                const loop = () => {
                    this.render();
                    requestAnimationFrame(loop);
                };
                loop();
            }
            
            setEmotion(emotion) {
                this.currentEmotion = emotion;
                const hueMap = { happy: 320, excited: 45, sleepy: 260, hungry: 30, loved: 340 };
                document.documentElement.style.setProperty('--primary-hue', hueMap[emotion] || 320);
            }
            
            render() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;
                ctx.clearRect(0, 0, w, h);
                
                const centerX = w / 2;
                const centerY = h / 2;
                
                this.breathPhase += 0.025;
                const breathScale = 1 + Math.sin(this.breathPhase) * 0.025;
                this.floatY = Math.sin(this.breathPhase * 0.6) * 6;
                this.tailWag = Math.sin(this.breathPhase * 2) * 0.15;
                this.earTwitch = Math.sin(this.breathPhase * 3) * 0.05;
                
                this.blinkTimer++;
                if (this.blinkDuration > 0) {
                    this.blinkDuration--;
                    this.eyeOpenness = Math.max(0.1, this.eyeOpenness - 0.4);
                } else if (this.eyeOpenness < 1) {
                    this.eyeOpenness = Math.min(1, this.eyeOpenness + 0.2);
                }
                
                if (this.blinkTimer > 180 + Math.random() * 60 && this.blinkDuration === 0) {
                    this.blinkDuration = 5;
                    this.blinkTimer = 0;
                }
                
                ctx.save();
                ctx.translate(centerX, centerY + this.floatY);
                ctx.scale(breathScale, breathScale);
                
                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.beginPath();
                ctx.ellipse(0, 75, 50, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Tail
                ctx.save();
                ctx.translate(-55, 45);
                ctx.rotate(-0.3 + this.tailWag);
                ctx.fillStyle = '#D4A5A5';
                ctx.beginPath();
                ctx.ellipse(0, 0, 25, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#A08080';
                for (let i = -1; i <= 1; i++) {
                    ctx.beginPath();
                    ctx.ellipse(i * 10, 0, 4, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                
                // Body
                const bodyGrad = ctx.createRadialGradient(-20, -30, 0, 0, 0, 90);
                bodyGrad.addColorStop(0, '#FFE8F0');
                bodyGrad.addColorStop(0.5, '#F5D0C5');
                bodyGrad.addColorStop(1, '#E8B4B8');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.ellipse(0, 25, 70, 80, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.ellipse(-25, 5, 25, 40, -0.3, 0, Math.PI * 2);
                ctx.fill();
                
                // Face
                const faceGrad = ctx.createRadialGradient(-10, -25, 0, 0, -10, 65);
                faceGrad.addColorStop(0, '#FFFFFF');
                faceGrad.addColorStop(0.7, '#FFF5F8');
                faceGrad.addColorStop(1, '#FFE8F0');
                ctx.fillStyle = faceGrad;
                ctx.beginPath();
                ctx.ellipse(0, -20, 58, 55, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Ears
                ctx.save();
                ctx.translate(-40, -65);
                ctx.rotate(-0.2 + this.earTwitch);
                ctx.fillStyle = '#E8B4B8';
                ctx.beginPath();
                ctx.moveTo(-5, 10);
                ctx.quadraticCurveTo(-20, -35, 0, -25);
                ctx.quadraticCurveTo(10, -15, -5, 10);
                ctx.fill();
                ctx.fillStyle = '#FFB6C1';
                ctx.beginPath();
                ctx.moveTo(-3, 5);
                ctx.quadraticCurveTo(-12, -20, 0, -15);
                ctx.quadraticCurveTo(5, -8, -3, 5);
                ctx.fill();
                ctx.restore();
                
                ctx.save();
                ctx.translate(40, -65);
                ctx.rotate(0.2 - this.earTwitch);
                ctx.fillStyle = '#E8B4B8';
                ctx.beginPath();
                ctx.moveTo(5, 10);
                ctx.quadraticCurveTo(20, -35, 0, -25);
                ctx.quadraticCurveTo(-10, -15, 5, 10);
                ctx.fill();
                ctx.fillStyle = '#FFB6C1';
                ctx.beginPath();
                ctx.moveTo(3, 5);
                ctx.quadraticCurveTo(12, -20, 0, -15);
                ctx.quadraticCurveTo(-5, -8, 3, 5);
                ctx.fill();
                ctx.restore();
                
                // Raccoon mask
                ctx.strokeStyle = '#5A5A5A';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.ellipse(-22, -22, 16, 13, -0.15, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(22, -22, 16, 13, 0.15, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(-8, -28);
                ctx.quadraticCurveTo(0, -32, 8, -28);
                ctx.stroke();
                
                // Eyes
                const eyeY = -22;
                const eyeSpacing = 22;
                
                ctx.fillStyle = '#2D1B4E';
                ctx.beginPath();
                ctx.ellipse(-eyeSpacing, eyeY, 8, 10 * this.eyeOpenness, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(eyeSpacing, eyeY, 8, 10 * this.eyeOpenness, 0, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.eyeOpenness > 0.3) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    ctx.beginPath();
                    ctx.arc(-eyeSpacing - 2, eyeY - 3, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eyeSpacing - 2, eyeY - 3, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Nose
                const noseGrad = ctx.createRadialGradient(-2, -8, 0, 0, -6, 8);
                noseGrad.addColorStop(0, '#FFB6C1');
                noseGrad.addColorStop(1, '#D4A5A5');
                ctx.fillStyle = noseGrad;
                ctx.beginPath();
                ctx.ellipse(0, -6, 5, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Mouth
                ctx.strokeStyle = '#D4A5A5';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                
                if (this.currentEmotion === 'happy' || this.currentEmotion === 'excited') {
                    ctx.beginPath();
                    ctx.arc(0, -8, 12, 0.15 * Math.PI, 0.85 * Math.PI);
                    ctx.stroke();
                    if (this.currentEmotion === 'excited') {
                        ctx.fillStyle = '#FFB6C1';
                        ctx.beginPath();
                        ctx.ellipse(0, -2, 5, 4, 0, 0, Math.PI);
                        ctx.fill();
                    }
                } else if (this.currentEmotion === 'sleepy') {
                    ctx.strokeStyle = '#5A5A5A';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(-eyeSpacing - 6, eyeY);
                    ctx.quadraticCurveTo(-eyeSpacing, eyeY + 3, -eyeSpacing + 6, eyeY);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(eyeSpacing - 6, eyeY);
                    ctx.quadraticCurveTo(eyeSpacing, eyeY + 3, eyeSpacing + 6, eyeY);
                    ctx.stroke();
                    ctx.strokeStyle = '#D4A5A5';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-5, -2);
                    ctx.lineTo(5, -2);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(-7, -2);
                    ctx.lineTo(7, -2);
                    ctx.stroke();
                }
                
                // Blush
                ctx.fillStyle = 'rgba(255, 150, 150, 0.35)';
                ctx.beginPath();
                ctx.ellipse(-40, -10, 14, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(40, -10, 14, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Belly
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.ellipse(0, 40, 30, 25, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            triggerAnimation(type) {
                const wrapper = document.getElementById('petWrapper');
                if (!wrapper) return;
                
                wrapper.classList.remove('pet-bounce', 'pet-spin', 'pet-jump', 'pet-hug');
                void wrapper.offsetWidth;
                wrapper.classList.add(`pet-${type}`);
                
                setTimeout(() => wrapper.classList.remove(`pet-${type}`), 2000);
            }
        }
        
        // ============================================
        // INITIALIZE
        // ============================================
        let petRenderer;
        
        document.addEventListener('DOMContentLoaded', () => {
            petRenderer = new PetRenderer('pet-canvas');
            
            const petWrapper = document.getElementById('petWrapper');
            petWrapper.addEventListener('click', (e) => {
                spawnParticles(e.clientX, e.clientY);
                petAction('tap');
            });
            
            petWrapper.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                spawnParticles(touch.clientX, touch.clientY);
                petAction('tap');
            });
            
            updateUI();
        });
        
        // ============================================
        // INTERACTIONS
        // ============================================
        function petAction(type) {
            const animations = { headpat: 'bounce', poke: 'bounce', tap: 'hug', water: 'jump' };
            petRenderer.triggerAnimation(animations[type] || 'bounce');
            
            if (type === 'water') {
                petRenderer.setEmotion('excited');
                showSpeechBubble('好清爽呀～💦');
            } else if (type === 'headpat') {
                petRenderer.setEmotion('loved');
                showSpeechBubble(MoodPhrases.loved[Math.floor(Math.random() * MoodPhrases.loved.length)]);
            } else if (type === 'poke') {
                petRenderer.setEmotion('excited');
                showSpeechBubble(MoodPhrases.excited[Math.floor(Math.random() * MoodPhrases.excited.length)]);
            } else {
                petRenderer.setEmotion('happy');
                showSpeechBubble(MoodPhrases.happy[Math.floor(Math.random() * MoodPhrases.happy.length)]);
            }
            
            addCoins(2);
            showToast(`🦝 +2 硬币`);
            
            setTimeout(() => {
                petRenderer.setEmotion('happy');
                hideSpeechBubble();
            }, 2500);
        }
        
        function spawnParticles(x, y) {
            const emojis = ['💕', '✨', '💗', '⭐', '🌸', '💫'];
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'touch-particle';
                p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
                p.style.setProperty('--ty', -Math.random() * 80 - 40 + 'px');
                p.style.animationDelay = (Math.random() * 0.2) + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }
        
        function showSpeechBubble(text) {
            const bubble = document.getElementById('speechBubble');
            bubble.textContent = text;
            bubble.classList.add('show');
        }
        
        function hideSpeechBubble() {
            document.getElementById('speechBubble').classList.remove('show');
        }
        
        // ============================================
        // MEAL TRACKING
        // ============================================
        function openMealDialog() {
            document.getElementById('mealDialog').classList.add('active');
            document.getElementById('cameraPlaceholder').style.display = 'flex';
            document.getElementById('foodResult').style.display = 'none';
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('mealDialogTitle').textContent = '🍰 记录餐食';
            document.getElementById('mealDialogMessage').textContent = '拍下你的餐食，AI 会帮你分析并喂养小浣熊～';
            document.getElementById('mealConfirmBtn').textContent = '拍照';
            document.getElementById('mealConfirmBtn').onclick = captureMeal;
        }
        
        function closeMealDialog() {
            document.getElementById('mealDialog').classList.remove('active');
        }
        
        async function captureMeal() {
            const placeholder = document.getElementById('cameraPlaceholder');
            const spinner = document.getElementById('loadingSpinner');
            const result = document.getElementById('foodResult');
            const confirmBtn = document.getElementById('mealConfirmBtn');
            
            placeholder.style.display = 'none';
            spinner.style.display = 'block';
            confirmBtn.style.display = 'none';
            
            await sleep(1800);
            
            const categories = ['dessert', 'main', 'fast', 'healthy', 'drinks'];
            const category = categories[Math.floor(Math.random() * categories.length)];
            const food = ConversationCorpus[category][Math.floor(Math.random() * ConversationCorpus[category].length)];
            
            spinner.style.display = 'none';
            result.style.display = 'block';
            document.getElementById('foodEmoji').textContent = food.emoji;
            document.getElementById('foodName').textContent = food.name;
            document.getElementById('foodCalories').textContent = food.cal + ' kcal';
            document.getElementById('foodLabel').textContent = food.label;
            
            document.getElementById('mealDialogTitle').textContent = '🦝 小浣熊说...';
            document.getElementById('mealDialogMessage').textContent = food.phrases[Math.floor(Math.random() * food.phrases.length)];
            
            confirmBtn.style.display = 'block';
            confirmBtn.textContent = '完成';
            confirmBtn.onclick = () => {
                const coins = 10 + Math.floor(food.cal / 50);
                addCoins(coins);
                addXP(Math.floor(food.cal / 30));
                AppState.mealsToday++;
                AppState.fullness = Math.min(100, AppState.fullness + Math.floor(food.cal / 20));
                AppState.streak++;
                
                petRenderer.setEmotion('excited');
                petRenderer.triggerAnimation('spin');
                
                setTimeout(() => {
                    petRenderer.setEmotion('happy');
                    closeMealDialog();
                    showToast(`🎉 +${coins} 硬币！`);
                    updateUI();
                }, 1500);
            };
        }
        
        function addWater() {
            AppState.waterIntake += 250;
            
            if (AppState.waterIntake >= AppState.waterGoal) {
                AppState.waterIntake = AppState.waterGoal;
                showToast('💧 今日水分目标达成！');
                petRenderer.setEmotion('excited');
                petRenderer.triggerAnimation('jump');
                addCoins(5);
            } else {
                showToast(`💧 +250ml`);
                petAction('water');
            }
            updateUI();
        }
        
        // ============================================
        // UI UPDATES
        // ============================================
        function updateUI() {
            document.getElementById('coinDisplay').textContent = AppState.coins;
            document.getElementById('mealsCount').textContent = AppState.mealsToday;
            document.getElementById('waterCount').textContent = AppState.waterIntake;
            document.getElementById('streakCount').textContent = AppState.streak;
            document.getElementById('fullnessCount').textContent = AppState.fullness;
            document.getElementById('xpCurrent').textContent = AppState.xp;
            document.getElementById('xpMax').textContent = AppState.xpToNext;
            document.getElementById('xpFill').style.width = (AppState.xp / AppState.xpToNext * 100) + '%';
            
            const moodText = { happy: '超开心', excited: '兴奋', sleepy: '困困', hungry: '饿了', loved: '被爱着' };
            document.getElementById('moodText').textContent = moodText[AppState.petMood] || '开心';
        }
        
        function addCoins(amount) {
            AppState.coins += amount;
            document.getElementById('coinDisplay').textContent = AppState.coins;
            
            const coinFloat = document.createElement('div');
            coinFloat.className = 'coin-float';
            coinFloat.textContent = `+${amount}`;
            coinFloat.style.left = '50%';
            coinFloat.style.top = '35%';
            coinFloat.style.transform = 'translateX(-50%)';
            document.body.appendChild(coinFloat);
            setTimeout(() => coinFloat.remove(), 1500);
        }
        
        function addXP(amount) {
            AppState.xp += amount;
            if (AppState.xp >= AppState.xpToNext) {
                AppState.level++;
                AppState.xp = AppState.xp - AppState.xpToNext;
                AppState.xpToNext = Math.floor(AppState.xpToNext * 1.5);
                document.getElementById('petLevel').textContent = `Lv.${AppState.level} 幼年期`;
                showToast(`🎊 升级了！现在是 Lv.${AppState.level}！`);
            }
            updateUI();
        }
        
        function showToast(message, duration = 2500) {
            const container = document.getElementById('toastContainer');
            const [icon, ...textParts] = message.split(' ');
            document.getElementById('toastIcon').textContent = icon;
            document.getElementById('toastText').textContent = textParts.join(' ');
            container.classList.add('show');
            setTimeout(() => container.classList.remove('show'), duration);
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
